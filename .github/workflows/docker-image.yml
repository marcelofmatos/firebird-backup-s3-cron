name: Docker image on GHCR

# O fluxo de release (tag, imagem versionada e deploy) vive no release-and-build.yml.
# Aqui ficam apenas os builds por branch (homolog/prod) e o disparo manual.
on:
  push:
    branches:
      #- 'main'
      - 'homolog'
      - 'prod'
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    if: github.ref_name != 'prod' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive  # Equivalente ao GIT_SUBMODULE_STRATEGY
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Log in to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Convert repository and tag name to lowercase
      id: lowercase_names
      run: |
        echo "repository_name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
        echo "tag_name=$(echo ${{ github.ref_name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Build Docker image
      run: docker build --build-arg APP_VERSION=${{ env.tag_name }} --build-arg GIT_COMMIT=$(git rev-parse --short HEAD) -t ghcr.io/${{ env.repository_name }}:${{ env.tag_name }} .

    - name: Push Docker image
      run: docker push ghcr.io/${{ env.repository_name }}:${{ env.tag_name }}

  update-services:
    runs-on: ubuntu-latest
    needs: build-image
    container:
      image: alpine/curl
    steps:
      - name: Install Bash
        run: apk add --no-cache bash
          
      - name: Convert repository and tag name to lowercase
        id: lowercase_names
        run: |
          echo "repository_name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          echo "tag_name=$(echo ${{ github.ref_name }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy Services
        env:
          WEBHOOK_HOMOLOG: ${{ secrets.WEBHOOK_DEPLOY_HOMOLOG }}
          GIT_REF: ${{ github.ref }}
        run: |
          IMAGE_NAME="ghcr.io/${{ env.repository_name }}:${{ env.tag_name }}"

          case "$GIT_REF" in
            "refs/heads/homolog")
              WEBHOOK_URL="$WEBHOOK_HOMOLOG"
              ;;
            *)
              echo "No deployment for ref $GIT_REF"
              exit 0
              ;;
          esac

          echo "Deploying image: $IMAGE_NAME"
          curl --silent --fail --show-error -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"image_name\": \"$IMAGE_NAME\"}"
        shell: bash
